name: ci

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read only. Release job overrides to write.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target_name: linux-x86_64
            enable_native: ON
          - os: ubuntu-latest
            arch: aarch64
            target_name: linux-aarch64
            cross: true
            enable_native: OFF
          - os: macos-13
            arch: x86_64
            target_name: macos-x86_64
            enable_native: ON
          - os: macos-latest
            arch: arm64
            target_name: macos-arm64
            enable_native: ON
          - os: windows-latest
            arch: x86_64
            target_name: windows-x86_64
            enable_native: OFF

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Cross-compiler
      if: matrix.cross == true
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Configure CMake (Default)
      if: matrix.cross != true
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_NATIVE_ARCH=${{ matrix.enable_native }}

    - name: Configure CMake (Linux Cross)
      if: matrix.cross == true
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DENABLE_NATIVE_ARCH=${{ matrix.enable_native }}

    - name: Build
      run: cmake --build build --config Release

    - name: Set up Python (Linux Native Only)
      if: matrix.os == 'ubuntu-latest' && matrix.cross != true
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies (Linux Native Only)
      if: matrix.os == 'ubuntu-latest' && matrix.cross != true
      run: |
        pip install pytest scipy autograd scikit-learn tqdm ruff

    - name: Lint Python (Linux Native Only)
      if: matrix.os == 'ubuntu-latest' && matrix.cross != true
      run: |
        ruff check cde.py test_cde.py
        ruff format --check cde.py test_cde.py

    - name: Run tests (Linux Native Only)
      if: matrix.os == 'ubuntu-latest' && matrix.cross != true
      run: |
        cp build/libsmolmaf.so . || true
        cp build/smolcde . || true
        chmod +x smolcde
        python -m pytest test_cde.py -v

    - name: Prepare Artifact
      shell: bash
      run: |
        mkdir -p dist
        case "${{ runner.os }}" in
          Windows)
            cp build/Release/smolcde.exe "dist/smolcde-${{ matrix.target_name }}.exe"
            cp build/Release/smolmaf.dll  "dist/smolmaf-${{ matrix.target_name }}.dll"
            ;;
          macOS)
            if [ -f build/Release/smolcde ]; then
              cp build/Release/smolcde "dist/smolcde-${{ matrix.target_name }}"
              cp build/Release/libsmolmaf.dylib "dist/libsmolmaf-${{ matrix.target_name }}.dylib"
            else
              cp build/smolcde "dist/smolcde-${{ matrix.target_name }}"
              cp build/libsmolmaf.dylib "dist/libsmolmaf-${{ matrix.target_name }}.dylib"
            fi
            ;;
          *)
            cp build/smolcde "dist/smolcde-${{ matrix.target_name }}"
            cp build/libsmolmaf.so "dist/libsmolmaf-${{ matrix.target_name }}.so"
            ;;
        esac

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.target_name }}
        path: dist/*

  package:
    name: Assemble Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: smolcde-all-binaries
          path: artifacts/*

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, package]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download per-platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: List downloaded binaries
        run: ls -la dist/

      - name: Bundle Python package
        run: |
          mkdir -p release
          find dist/ -maxdepth 1 -type f -exec cp {} release/ \;
          cp cde.py release/
          cp README.md release/
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES_${{ github.ref_name }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
